<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#f9a8d4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Moomy Alesha - Tracker ASI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --pink-50: #fdf2f8;
    --pink-100: #fce7f3;
    --pink-200: #fbcfe8;
    --pink-300: #f9a8d4;
    --pink-400: #f472b6;
    --pink-500: #ec4899;
    --pink-600: #db2777;
    --rose-100: #ffe4e6;
    --rose-200: #fecdd3;
    --peach: #fff1f2;
    --text-dark: #831843;
    --text-mid: #9d174d;
    --text-light: #be185d;
    --text-muted: #f9a8d4;
    --white: #fff;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(236,72,153,0.10);
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(160deg, #fdf2f8 0%, #fff1f2 100%);
    min-height: 100vh;
    color: var(--text-dark);
    padding-bottom: 90px;
  }

  header {
    background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 100%);
    padding: 20px 16px 16px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 16px rgba(236,72,153,0.20);
  }
  header .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; letter-spacing: 0.3px; }
  header p { font-size: 12px; color: rgba(255,255,255,0.85); margin-top: 2px; }

  nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #fff;
    border-top: 1px solid var(--pink-200);
    display: flex;
    z-index: 100;
    box-shadow: 0 -4px 20px rgba(236,72,153,0.10);
  }
  nav button {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    color: #be185d;
    opacity: 0.5;
    transition: opacity 0.2s;
    font-weight: 600;
  }
  nav button.active { opacity: 1; color: var(--pink-500); }
  nav button svg { width: 22px; height: 22px; }

  .page { display: none; padding: 16px; animation: fadeIn 0.2s; }
  .page.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }

  .card {
    background: #fff;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    border: 1px solid var(--pink-100);
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--pink-500);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 14px; }
  .stat-box {
    background: linear-gradient(135deg, #fce7f3, #ffe4e6);
    border-radius: var(--radius-sm);
    padding: 14px 12px;
    text-align: center;
    border: 1px solid var(--pink-200);
  }
  .stat-box.full { grid-column: 1/-1; background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--pink-600); line-height: 1; }
  .stat-num.big { font-size: 36px; }
  .stat-label { font-size: 11px; color: var(--text-light); margin-top: 4px; font-weight: 600; }

  .feed-item {
    background: var(--pink-50);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid var(--pink-300);
    display: flex;
    align-items: flex-start;
    gap: 12px;
    position: relative;
  }
  .feed-time { font-size: 13px; font-weight: 700; color: var(--pink-600); min-width: 44px; }
  .feed-info { flex: 1; }
  .feed-ml { font-size: 18px; font-weight: 700; color: var(--text-dark); }
  .feed-note { font-size: 12px; color: var(--text-light); margin-top: 2px; }
  .feed-date { font-size: 11px; color: var(--text-muted); }
  .feed-actions { display: flex; gap: 6px; }
  .btn-icon {
    background: none;
    border: 1px solid var(--pink-200);
    border-radius: 8px;
    width: 32px; height: 32px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--pink-500);
    font-size: 15px;
    transition: background 0.15s;
  }
  .btn-icon:active { background: var(--pink-100); }
  .btn-icon.danger { color: #e11d48; border-color: #fecdd3; }

  .btn-primary {
    background: linear-gradient(135deg, var(--pink-400), var(--pink-500));
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    padding: 14px 24px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
    margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(236,72,153,0.30);
    transition: transform 0.1s, box-shadow 0.1s;
    letter-spacing: 0.2px;
  }
  .btn-primary:active { transform: scale(0.98); box-shadow: 0 2px 8px rgba(236,72,153,0.20); }
  .btn-secondary {
    background: #fff;
    color: var(--pink-500);
    border: 1.5px solid var(--pink-300);
    border-radius: var(--radius-sm);
    padding: 13px 24px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    transition: background 0.15s;
  }
  .btn-secondary:active { background: var(--pink-50); }

  label {
    display: block;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-light);
    margin-bottom: 6px;
    margin-top: 14px;
  }
  label:first-of-type { margin-top: 0; }

  input[type=text], input[type=number], input[type=date], input[type=time], textarea, select {
    width: 100%;
    background: var(--pink-50);
    border: 1.5px solid var(--pink-200);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 16px;
    color: var(--text-dark);
    outline: none;
    font-family: inherit;
    transition: border-color 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, textarea:focus, select:focus { border-color: var(--pink-400); background: #fff; }
  textarea { min-height: 80px; resize: vertical; }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    align-items: center;
  }
  .filter-row input { flex: 1; }
  .filter-row button {
    background: var(--pink-100);
    border: 1.5px solid var(--pink-200);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    color: var(--pink-600);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-row button:active { background: var(--pink-200); }

  .day-group { margin-bottom: 16px; }
  .day-header {
    font-size: 13px;
    font-weight: 700;
    color: var(--pink-500);
    background: var(--pink-100);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .day-header .day-total { font-size: 12px; color: var(--text-light); font-weight: 600; }

  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(157,23,77,0.25);
    z-index: 200;
    align-items: flex-end;
    justify-content: center;
    padding: 0;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: #fff;
    border-radius: 24px 24px 0 0;
    padding: 20px 16px 32px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.34,1.26,0.64,1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle { width: 36px; height: 4px; background: var(--pink-200); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 18px; font-weight: 700; color: var(--text-dark); margin-bottom: 16px; text-align: center; }

  .rekap-item {
    background: #fff;
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    border: 1px solid var(--pink-100);
  }
  .rekap-date { font-size: 14px; font-weight: 700; color: var(--text-dark); margin-bottom: 6px; }
  .rekap-stats { display: flex; gap: 16px; }
  .rekap-stat { font-size: 13px; color: var(--text-light); }
  .rekap-stat span { font-weight: 700; color: var(--pink-600); }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--pink-300);
  }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 15px; color: var(--text-light); }

  .week-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .week-stat-box {
    background: linear-gradient(135deg, #fce7f3, #ffe4e6);
    border-radius: var(--radius-sm);
    padding: 12px 8px;
    text-align: center;
    border: 1px solid var(--pink-200);
  }
  .week-stat-num { font-size: 18px; font-weight: 700; color: var(--pink-600); }
  .week-stat-label { font-size: 10px; color: var(--text-light); font-weight: 600; margin-top: 3px; }

  .chart-container { position: relative; height: 200px; margin-top: 8px; }

  .toast {
    position: fixed;
    bottom: 100px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--pink-600);
    color: #fff;
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 600;
    z-index: 500;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .fab {
    position: fixed;
    bottom: 80px; right: 16px;
    width: 54px; height: 54px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--pink-400), var(--pink-600));
    border: none;
    box-shadow: 0 4px 16px rgba(236,72,153,0.40);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 90;
    transition: transform 0.15s;
  }
  .fab:active { transform: scale(0.93); }
  .fab svg { width: 26px; height: 26px; color: #fff; }

  @media (min-width: 480px) {
    .page { max-width: 480px; margin: 0 auto; }
    header { padding: 24px 20px 18px; }
  }
</style>
</head>
<body>

<header>
  <span class="emoji">🍼</span>
  <h1>Moomy Alesha</h1>
  <p>Tracker ASI Bayi</p>
</header>

<div id="page-dashboard" class="page active">
  <div class="stat-grid" id="dashboard-stats"></div>
  <div class="card">
    <div class="card-title">🌸 Sesi Hari Ini</div>
    <div id="today-list"></div>
  </div>
</div>

<div id="page-tambah" class="page">
  <div class="card">
    <div class="card-title">🍼 Catat Minum ASI</div>
    <input type="hidden" id="edit-id">
    <label>Tanggal</label>
    <input type="date" id="inp-tanggal">
    <label>Jam Minum</label>
    <input type="time" id="inp-jam">
    <label>Jumlah ASI (ml)</label>
    <input type="number" id="inp-ml" placeholder="Contoh: 80" min="1" max="500">
    <label>Catatan (opsional)</label>
    <textarea id="inp-catatan" placeholder="Misal: setelah mandi, rewel sebentar..."></textarea>
    <div style="height:16px"></div>
    <button class="btn-primary" onclick="simpanData()">💾 Simpan</button>
    <button class="btn-secondary" onclick="resetForm()">Batal / Baru</button>
  </div>
</div>

<div id="page-riwayat" class="page">
  <div class="filter-row">
    <input type="date" id="filter-date">
    <button onclick="clearFilter()">Semua</button>
  </div>
  <div id="riwayat-list"></div>
</div>

<div id="page-rekap" class="page">
  <div class="card">
    <div class="card-title">📊 Statistik Minggu Ini</div>
    <div class="week-stats" id="week-stats"></div>
    <div class="chart-container">
      <canvas id="chartASI"></canvas>
    </div>
  </div>
  <div class="card">
    <div class="card-title">📅 Rekap Harian</div>
    <div id="rekap-list"></div>
  </div>
</div>

<nav>
  <button class="active" onclick="switchPage('dashboard',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    Beranda
  </button>
  <button onclick="switchPage('tambah',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
    Catat
  </button>
  <button onclick="switchPage('riwayat',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
    Riwayat
  </button>
  <button onclick="switchPage('rekap',this)">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
    Statistik
  </button>
</nav>

<button class="fab" onclick="switchPage('tambah', document.querySelectorAll('nav button')[1]); resetForm();" title="Catat ASI">
  <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
</button>

<div class="modal-overlay" id="modal-overlay" onclick="tutupModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">Hapus Data?</div>
    <p style="text-align:center;color:#be185d;font-size:14px;margin-bottom:20px">Data minum ASI ini akan dihapus permanen.</p>
    <button class="btn-primary" style="background:linear-gradient(135deg,#fb7185,#e11d48)" onclick="konfirmasiHapus()">🗑️ Ya, Hapus</button>
    <button class="btn-secondary" onclick="tutupModal()">Batal</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const STORE = 'moomy_alesha_asi';
let chart = null;
let hapusId = null;

function getData() {
  try { return JSON.parse(localStorage.getItem(STORE)) || []; } catch { return []; }
}

function saveData(data) {
  localStorage.setItem(STORE, JSON.stringify(data));
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

function formatTanggal(d) {
  const dt = new Date(d + 'T00:00:00');
  return dt.toLocaleDateString('id-ID', { weekday:'long', day:'numeric', month:'long', year:'numeric' });
}

function todayStr() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'dashboard') renderDashboard();
  if (name === 'riwayat') renderRiwayat();
  if (name === 'rekap') renderRekap();
}

function resetForm() {
  document.getElementById('edit-id').value = '';
  document.getElementById('inp-tanggal').value = todayStr();
  document.getElementById('inp-jam').value = new Date().toTimeString().slice(0,5);
  document.getElementById('inp-ml').value = '';
  document.getElementById('inp-catatan').value = '';
  document.querySelector('#page-tambah .modal-title') && (document.querySelector('#page-tambah .card-title').textContent = '🍼 Catat Minum ASI');
}

function simpanData() {
  const tanggal = document.getElementById('inp-tanggal').value;
  const jam = document.getElementById('inp-jam').value;
  const ml = parseInt(document.getElementById('inp-ml').value);
  const catatan = document.getElementById('inp-catatan').value.trim();

  if (!tanggal) return showToast('⚠️ Pilih tanggal dulu');
  if (!jam) return showToast('⚠️ Pilih jam dulu');
  if (!ml || ml < 1) return showToast('⚠️ Masukkan jumlah ASI (ml)');

  const data = getData();
  const editId = document.getElementById('edit-id').value;

  if (editId) {
    const idx = data.findIndex(d => d.id === editId);
    if (idx !== -1) {
      data[idx] = { ...data[idx], tanggal, jam, ml, catatan };
      showToast('✅ Data berhasil diperbarui!');
    }
  } else {
    data.push({ id: uid(), tanggal, jam, ml, catatan, createdAt: Date.now() });
    showToast('🍼 Berhasil dicatat!');
  }

  saveData(data);
  resetForm();
  document.getElementById('edit-id').value = '';
  document.querySelector('#page-tambah .card-title').textContent = '🍼 Catat Minum ASI';
}

function editData(id) {
  const data = getData();
  const item = data.find(d => d.id === id);
  if (!item) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('inp-tanggal').value = item.tanggal;
  document.getElementById('inp-jam').value = item.jam;
  document.getElementById('inp-ml').value = item.ml;
  document.getElementById('inp-catatan').value = item.catatan || '';
  document.querySelector('#page-tambah .card-title').textContent = '✏️ Edit Data ASI';
  switchPage('tambah', document.querySelectorAll('nav button')[1]);
}

function hapusData(id) {
  hapusId = id;
  document.getElementById('modal-overlay').classList.add('open');
}

function konfirmasiHapus() {
  if (!hapusId) return;
  const data = getData().filter(d => d.id !== hapusId);
  saveData(data);
  hapusId = null;
  tutupModal();
  showToast('🗑️ Data dihapus');
  renderDashboard();
  renderRiwayat();
}

function tutupModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  hapusId = null;
}

function feedItemHTML(item, showDate=false) {
  return `<div class="feed-item">
    <div>
      <div class="feed-time">${item.jam}</div>
      ${showDate ? `<div class="feed-date">${formatTanggal(item.tanggal)}</div>` : ''}
    </div>
    <div class="feed-info">
      <div class="feed-ml">${item.ml} ml</div>
      ${item.catatan ? `<div class="feed-note">${escHtml(item.catatan)}</div>` : ''}
    </div>
    <div class="feed-actions">
      <button class="btn-icon" onclick="editData('${item.id}')" title="Edit">✏️</button>
      <button class="btn-icon danger" onclick="hapusData('${item.id}')" title="Hapus">🗑️</button>
    </div>
  </div>`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderDashboard() {
  const data = getData();
  const today = todayStr();
  const todayData = data.filter(d => d.tanggal === today).sort((a,b) => b.jam.localeCompare(a.jam));
  const totalMl = todayData.reduce((s,d) => s+d.ml, 0);
  const sesi = todayData.length;

  const statsEl = document.getElementById('dashboard-stats');
  statsEl.innerHTML = `
    <div class="stat-box full">
      <div class="stat-num big">${totalMl}</div>
      <div class="stat-label">ml ASI Hari Ini</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${sesi}</div>
      <div class="stat-label">Sesi Minum</div>
    </div>
    <div class="stat-box">
      <div class="stat-num">${sesi ? Math.round(totalMl/sesi) : 0}</div>
      <div class="stat-label">Rata-rata/Sesi (ml)</div>
    </div>
  `;

  const listEl = document.getElementById('today-list');
  if (todayData.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="big">🍼</div><p>Belum ada catatan hari ini.<br>Yuk, catat ASI pertama Alesha!</p></div>`;
  } else {
    listEl.innerHTML = todayData.map(d => feedItemHTML(d)).join('');
  }
}

function renderRiwayat() {
  const data = getData();
  const filterDate = document.getElementById('filter-date').value;
  let filtered = filterDate ? data.filter(d => d.tanggal === filterDate) : data;
  filtered = filtered.sort((a,b) => (b.tanggal+b.jam).localeCompare(a.tanggal+a.jam));

  const listEl = document.getElementById('riwayat-list');
  if (filtered.length === 0) {
    listEl.innerHTML = `<div class="empty-state"><div class="big">📋</div><p>Tidak ada data ditemukan.</p></div>`;
    return;
  }

  const byDay = {};
  filtered.forEach(d => {
    if (!byDay[d.tanggal]) byDay[d.tanggal] = [];
    byDay[d.tanggal].push(d);
  });

  const sortedDays = Object.keys(byDay).sort((a,b) => b.localeCompare(a));
  listEl.innerHTML = sortedDays.map(day => {
    const items = byDay[day].sort((a,b) => b.jam.localeCompare(a.jam));
    const total = items.reduce((s,d) => s+d.ml, 0);
    return `<div class="day-group">
      <div class="day-header">
        <span>${formatTanggal(day)}</span>
        <span class="day-total">${total} ml · ${items.length}x</span>
      </div>
      ${items.map(d => feedItemHTML(d)).join('')}
    </div>`;
  }).join('');
}

function clearFilter() {
  document.getElementById('filter-date').value = '';
  renderRiwayat();
}

function renderRekap() {
  const data = getData();

  const today = new Date();
  const weekAgo = new Date(today);
  weekAgo.setDate(weekAgo.getDate() - 6);

  const weekData = data.filter(d => {
    const dt = new Date(d.tanggal + 'T00:00:00');
    return dt >= weekAgo && dt <= today;
  });
  const totalWeek = weekData.reduce((s,d) => s+d.ml, 0);

  const byDay = {};
  data.forEach(d => {
    if (!byDay[d.tanggal]) byDay[d.tanggal] = [];
    byDay[d.tanggal].push(d);
  });

  const weekDays = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    weekDays.push(d.toISOString().slice(0,10));
  }

  const weekDayTotals = weekDays.map(d => ({
    date: d,
    total: (byDay[d]||[]).reduce((s,x)=>s+x.ml,0)
  }));

  const activeDays = weekDayTotals.filter(d => d.total > 0);
  const avgPerDay = activeDays.length ? Math.round(totalWeek / activeDays.length) : 0;

  document.getElementById('week-stats').innerHTML = `
    <div class="week-stat-box">
      <div class="week-stat-num">${totalWeek}</div>
      <div class="week-stat-label">Total ml/minggu</div>
    </div>
    <div class="week-stat-box">
      <div class="week-stat-num">${activeDays.length}</div>
      <div class="week-stat-label">Hari aktif</div>
    </div>
    <div class="week-stat-box">
      <div class="week-stat-num">${avgPerDay}</div>
      <div class="week-stat-label">Rata-rata/hari</div>
    </div>
  `;

  if (chart) { chart.destroy(); chart = null; }
  const ctx = document.getElementById('chartASI').getContext('2d');
  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: weekDayTotals.map(d => {
        const dt = new Date(d.date + 'T00:00:00');
        return dt.toLocaleDateString('id-ID', { weekday:'short', day:'numeric' });
      }),
      datasets: [{
        label: 'ml ASI',
        data: weekDayTotals.map(d => d.total),
        backgroundColor: weekDayTotals.map(d => d.total > 0 ? 'rgba(244,114,182,0.75)' : 'rgba(251,207,232,0.4)'),
        borderColor: weekDayTotals.map(d => d.total > 0 ? '#ec4899' : '#f9a8d4'),
        borderWidth: 1.5,
        borderRadius: 8,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.raw} ml`
          }
        }
      },
      scales: {
        y: {
          beginAtZero: true,
          grid: { color: 'rgba(249,168,212,0.2)' },
          ticks: { color: '#be185d', font: { size: 11 }, callback: v => v + ' ml' }
        },
        x: {
          grid: { display: false },
          ticks: { color: '#be185d', font: { size: 10 } }
        }
      }
    }
  });

  const sortedDays = Object.keys(byDay).sort((a,b) => b.localeCompare(a));
  const rekapEl = document.getElementById('rekap-list');
  if (sortedDays.length === 0) {
    rekapEl.innerHTML = `<div class="empty-state"><div class="big">📊</div><p>Belum ada data rekap.</p></div>`;
    return;
  }
  rekapEl.innerHTML = sortedDays.map(day => {
    const items = byDay[day];
    const total = items.reduce((s,d) => s+d.ml, 0);
    return `<div class="rekap-item">
      <div class="rekap-date">${formatTanggal(day)}</div>
      <div class="rekap-stats">
        <div class="rekap-stat">Total: <span>${total} ml</span></div>
        <div class="rekap-stat">Sesi: <span>${items.length}x</span></div>
        <div class="rekap-stat">Rata-rata: <span>${Math.round(total/items.length)} ml</span></div>
      </div>
    </div>`;
  }).join('');
}

document.getElementById('filter-date').addEventListener('change', renderRiwayat);

resetForm();
renderDashboard();
</script>
</body>
